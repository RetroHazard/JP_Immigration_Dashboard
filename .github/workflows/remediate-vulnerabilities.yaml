name: Remediate Security Vulnerabilities

on:
  workflow_dispatch:
    inputs:
      trigger_ref:
        description: 'Git reference that triggered this (branch or commit)'
        required: false
        default: 'main'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  remediate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run npm audit fix
        id: audit-fix
        continue-on-error: true
        run: |
          npm audit fix --audit-level=moderate
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create or update PR with fixes
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');

            const timestamp = new Date().toISOString().split('T')[0];
            const branchName = `security/npm-audit-fix-${timestamp}`;

            // Create branch
            execSync(`git config user.email "github-actions@github.com"`);
            execSync(`git config user.name "GitHub Actions"`);
            execSync(`git checkout -b ${branchName}`);
            execSync(`git add package.json package-lock.json`);
            execSync(`git commit -m "chore: resolve security vulnerabilities via npm audit fix\n\nAutomatically generated fix for npm audit findings."`);
            execSync(`git push -u origin ${branchName}`);

            // Check if PR already exists
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branchName}`
            });

            if (prs.length === 0) {
              // Create new PR
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔒 Security: Resolve npm audit vulnerabilities (${timestamp})`,
                head: branchName,
                base: 'main',
                body: `## Automated Security Fix\n\nThis PR resolves security vulnerabilities detected by \`npm audit\`.\n\n### Changes\n- Ran \`npm audit fix --audit-level=moderate\`\n- Updated vulnerable dependencies\n\n### Next Steps\n1. Verify the changes don't break functionality\n2. Review updated dependency versions\n3. Merge if tests pass\n\n*This PR was automatically generated.*`
              });
              console.log(`✅ Created PR #${pr.number}`);
            } else {
              console.log(`ℹ️ PR already exists: #${prs[0].number}`);
            }

      - name: Check for unfixable vulnerabilities
        id: remaining-audit
        continue-on-error: true
        run: |
          npm audit --audit-level=moderate
          echo "remaining_vulnerabilities=false" >> $GITHUB_OUTPUT
          exit 0

      - name: Create issue for remaining vulnerabilities
        if: failure() && steps.remaining-audit.outcome == 'failure'
        uses: actions/github-script@v6
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security/npm-audit',
              state: 'open'
            });

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🔒 Security: Unfixable npm audit vulnerabilities detected',
                labels: ['security', 'npm-audit'],
                body: `## Unfixable Vulnerabilities Detected\n\nThe automated \`npm audit fix\` could not resolve some vulnerabilities. These require manual investigation:\n\n### Next Steps\n1. Run \`npm audit\` locally to see detailed information\n2. Check if vulnerabilities are in dev dependencies only\n3. Investigate upstream fixes or alternative packages\n4. Update the comment below when resolved\n\n**Run locally:**\n\`\`\`bash\ngit clone <repo>\ncd <project>\nnpm ci\nnpm audit --audit-level=moderate\n\`\`\`\n\n*Automatically generated by security audit workflow.*`
              });
              console.log('✅ Created issue for unfixable vulnerabilities');
            }

      - name: Summary
        run: |
          echo "### 🔒 Vulnerability Remediation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ **Fixes Applied:** Package updates committed and PR created" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **No Automatic Fixes Available:** All vulnerabilities require manual review" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
